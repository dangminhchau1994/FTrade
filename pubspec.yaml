name: ftrade
description: "FTrade - Vietnamese Stock Market Trading Tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2
  mqtt_client: ^10.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Data Models / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional Programming (Either for error handling)
  fpdart: ^1.1.0

  # Charts (stock charts)
  fl_chart: ^0.70.2

  # Formatting (date, currency, numbers)
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Environment Config
  flutter_dotenv: ^5.2.1

  # UI Utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Logger
  logger: ^2.5.0
  xml: ^6.5.0
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # assets:
  #   - .env
  #   - assets/images/
  #   - assets/icons/
